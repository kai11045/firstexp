<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title th:text="${title}">我的网站</title>
	<link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
	<header th:fragment="header" class="site-header">
		<nav class="nav">
			<a class="logo" th:href="@{/}">MySite</a>
			<ul>
				<li><a th:href="@{/}">首页</a></li>
				<li><a th:href="@{/about}">关于我</a></li>
				<li><a th:href="@{/projects}">项目</a></li>
				<li><a th:href="@{/contact}">联系</a></li>
			</ul>
		</nav>
	</header>
	<main class="container">
		<div th:insert="~{::content}"></div>
	</main>
	<footer th:fragment="footer" class="site-footer">
		<p>© <span th:text="${#calendars.format(#dates.createNow(), 'yyyy')}"></span> MySite. All rights reserved.</p>
	</footer>
</body>
</html>
