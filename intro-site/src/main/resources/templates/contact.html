<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body>
	<div th:replace="~{layout :: header}"></div>
	<main class="container">
		<section>
			<h1 th:text="${title}">联系我</h1>
			<p>邮箱：<a href="mailto:zhangkaiwen@example.com">zhangkaiwen@example.com</a></p>
			<form class="form" method="post" action="#">
				<label>姓名
					<input type="text" name="name" placeholder="你的名字" />
				</label>
				<label>邮箱
					<input type="email" name="email" placeholder="your@email.com" />
				</label>
				<label>消息
					<textarea name="message" rows="4" placeholder="想对我说的话"></textarea>
				</label>
				<button class="btn" type="submit" disabled>发送（演示）</button>
			</form>
		</section>
	</main>
	<div th:replace="~{layout :: footer}"></div>
</body>
</html>
